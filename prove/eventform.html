<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Event Ticket</title>
  <link rel="icon" href="favicon.ico">
  <link rel="stylesheet" href="eventform.css" />
  <script src="eventform.js" defer></script>
</head>
<body>
  <main class="wrapper">

    <form id="ticketForm">
      <h2>Event Ticket</h2>

      <div class="field-row">
        <div class="field">
          <label for="firstName">First Name</label>
          <input id="firstName" name="firstName" type="text" required />
        </div>
        <div class="field">
          <label for="lastName">Last Name</label>
          <input id="lastName" name="lastName" type="text" required />
        </div>
      </div>

      <div class="field">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" required />
      </div>

      <div class="field-row">
        <div class="field">
          <label for="type">Type</label>
          <select id="type" name="type" required>
            <option value="">Choose one</option>
            <option value="student">Student</option>
            <option value="guest">Guest</option>
          </select>
        </div>
        <div class="field">
          <label for="eventDate">Event Date</label>
          <input id="eventDate" name="eventDate" type="date" required />
        </div>
      </div>

      <!-- This div stays hidden until the user picks Student or Guest -->
      <div id="extraField" class="field" hidden>
        <label id="extraLabel" for="extraInput">Student I#</label>
        <input id="extraInput" name="extraInput" type="text" minlength="9" maxlength="9" />
      </div>

      <button type="submit">Create Ticket</button>
    </form>

    <section id="output" aria-live="polite"></section>

  </main>
</body>
</html>
