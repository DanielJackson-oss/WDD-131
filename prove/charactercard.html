<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Card</title>
    <link  href="charactercard.css" rel="stylesheet">
    <script src="charactercard.js" defer></script>

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Character Card">
    <meta property="og:description" content="A JavaScript character card with level up and attack features.">
    <meta property="og:url" content="https://githubusername.github.io/wdd131/charactercard">
    <meta property="og:image" content="https://yourURLofSocialPreviewImageHere.png">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Character Card">
    <meta name="twitter:description" content="A JavaScript character card with level up and attack features.">
    <meta name="twitter:image" content="https://yourURLofSocialPreviewImageHere.png">

    <!-- Favicon -->
    <link rel="icon" href="/favicon.ico">
    <link rel="apple-touch-icon" href="/images/apple-touch-icon.png">
</head>
<body>

    <div class="card">
        <img class="image" src="../images/snortleblat.webp" alt="Snortleblat">
        <div class="name" id="name"></div>
        <div class="stats">
            <p>Class: <span id="class"></span></p>
            <p>Level: <span id="level"></span></p>
            <p>Health: <span id="health"></span></p>
        </div>
        <div class="buttons">
            <button onclick="attackBtn()">⚔️ Attack</button>
            <button onclick="levelUpBtn()">⬆️ Level Up</button>
        </div>
    </div>

</body>
</html>
